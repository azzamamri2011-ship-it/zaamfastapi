<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZaamMusic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Circular+Std:wght@400;500;700&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">

  <!-- LOGO -->
  <div class="sidebar-logo">
    <svg width="32" height="32" viewBox="0 0 50 50" fill="none">
      <circle cx="25" cy="25" r="25" fill="#1DB954"/>
      <path d="M12 17c7-3 17-2 24 3" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>
      <path d="M14 24c5.5-2 13-1.5 19 2.5" stroke="#000" stroke-width="3" stroke-linecap="round"/>
      <path d="M16 31c4-1.5 9.5-1 14 2" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
    <span class="logo-text">ZaamMusic</span>
  </div>

  <!-- MAIN NAV -->
  <nav class="sidebar-nav">
    <a class="nav-item active" id="nav-home" onclick="navigate('home')">
      <span class="nav-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12.97 2.59a1.5 1.5 0 0 0-1.94 0l-7.5 6.363A1.5 1.5 0 0 0 3 10.097V19.5A1.5 1.5 0 0 0 4.5 21h4.75a.75.75 0 0 0 .75-.75V14h4v6.25c0 .414.336.75.75.75H19.5a1.5 1.5 0 0 0 1.5-1.5v-9.403a1.5 1.5 0 0 0-.53-1.144l-7.5-6.363z"/></svg>
      </span>
      <span class="nav-label">Beranda</span>
    </a>
    <a class="nav-item" id="nav-search" onclick="navigate('search')">
      <span class="nav-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </span>
      <span class="nav-label">Cari</span>
    </a>
  </nav>

  <!-- LIBRARY -->
  <div class="sidebar-library">
    <div class="library-header">
      <div class="lib-title-row">
        <span class="nav-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M3 4a1 1 0 0 1 1-1h1a1 1 0 0 1 0 2H4a1 1 0 0 1-1-1zm0 6a1 1 0 0 1 1-1h1a1 1 0 0 1 0 2H4a1 1 0 0 1-1-1zm0 6a1 1 0 0 1 1-1h1a1 1 0 0 1 0 2H4a1 1 0 0 1-1-1zm5-12h10a1 1 0 1 1 0 2H8a1 1 0 0 1 0-2zm0 6h10a1 1 0 1 1 0 2H8a1 1 0 0 1 0-2zm0 6h10a1 1 0 1 1 0 2H8a1 1 0 0 1 0-2z"/></svg>
        </span>
        <span class="nav-label">Perpustakaan</span>
        <button class="lib-add-btn" onclick="navigate('library')" title="Lihat Perpustakaan">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>

      <!-- Library Filter Chips -->
      <div class="lib-chips" id="libChips">
        <button class="lib-chip active" onclick="filterLib('all')">Semua</button>
        <button class="lib-chip" onclick="filterLib('playlist')">Playlist</button>
        <button class="lib-chip" onclick="filterLib('history')">Riwayat</button>
      </div>
    </div>

    <!-- Library Items -->
    <div class="lib-items" id="libItems">
      <!-- Playlists -->
      <div class="lib-item lib-playlist" onclick="openPlaylist('liked')">
        <div class="lib-icon liked-songs-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </div>
        <div class="lib-info">
          <span class="lib-name">Lagu yang Disukai</span>
          <span class="lib-sub">Playlist • <span id="likedCount">0</span> lagu</span>
        </div>
      </div>

      <div class="lib-item lib-playlist" onclick="openPlaylist('chill')">
        <div class="lib-icon" style="background: linear-gradient(135deg,#4facfe,#00f2fe)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </div>
        <div class="lib-info">
          <span class="lib-name">Chill Vibes</span>
          <span class="lib-sub">Playlist • <span id="chillCount">0</span> lagu</span>
        </div>
      </div>

      <div class="lib-item lib-playlist" onclick="openPlaylist('galau')">
        <div class="lib-icon" style="background: linear-gradient(135deg,#a18cd1,#fbc2eb)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </div>
        <div class="lib-info">
          <span class="lib-name">Galau Mode</span>
          <span class="lib-sub">Playlist • <span id="galauCount">0</span> lagu</span>
        </div>
      </div>

      <!-- History Section -->
      <div class="lib-section-label lib-history">Riwayat Pemutaran</div>
      <div id="historyItems">
        <div class="lib-empty-history">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>Belum ada riwayat</span>
        </div>
      </div>
    </div>
  </div>
</aside>

<!-- MAIN CONTENT -->
<main id="main">

  <!-- TOP NAV BAR -->
  <div class="topbar" id="topbar">
    <div class="topbar-nav">
      <button class="topbar-arrow" id="btnBack" onclick="historyBack()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </button>
      <button class="topbar-arrow" id="btnForward" onclick="historyForward()" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>
    </div>

    <!-- Search Bar (visible on search page) -->
    <div class="topbar-search" id="topbarSearch" style="display:none">
      <div class="search-box">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" placeholder="Apa yang ingin kamu dengarkan?" autocomplete="off"/>
        <button class="search-clear" id="clearSearch" onclick="clearSearchInput()" style="display:none">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
        </button>
      </div>
    </div>

    <div class="topbar-user">
      <div class="user-avatar">Z</div>
    </div>
  </div>

  <!-- PAGE CONTENT -->
  <div id="content"></div>
</main>

<!-- PLAYER BAR -->
<footer id="playerBar">
  <!-- Track Info Left -->
  <div class="player-left">
    <div class="player-thumb-wrap">
      <img id="playerThumb" src="" alt="" onerror="this.style.visibility='hidden'"/>
      <div class="player-thumb-placeholder">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="color:#535353"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      </div>
    </div>
    <div class="player-track-info">
      <div id="playerTitle">—</div>
      <div id="playerArtist">Pilih lagu untuk diputar</div>
    </div>
    <button class="like-btn" id="likeBtn" onclick="toggleLike()" title="Simpan ke Lagu yang Disukai">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    </button>
  </div>

  <!-- Controls Center -->
  <div class="player-center">
    <div class="player-controls">
      <button class="ctrl-btn shuffle-btn" id="shuffleBtn" onclick="toggleShuffle()" title="Acak">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="prevTrack()" title="Sebelumnya">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn play-main" id="playBtn" onclick="togglePlay()">
        <svg id="playIcon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="nextTrack()" title="Berikutnya">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2.5-6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn repeat-btn" id="repeatBtn" onclick="toggleRepeat()" title="Ulangi">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
      </button>
    </div>
    <div class="progress-row">
      <span class="time-lbl" id="curTime">0:00</span>
      <div class="progress-wrap">
        <input type="range" id="progressBar" min="0" max="100" value="0"/>
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <span class="time-lbl" id="durTime">0:00</span>
    </div>
  </div>

  <!-- Volume Right -->
  <div class="player-right">
    <button class="ctrl-btn queue-btn" onclick="navigate('library')" title="Antrian">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
    </button>
    <button class="ctrl-btn vol-icon" onclick="toggleMute()">
      <svg id="volIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
    </button>
    <div class="volume-wrap">
      <input type="range" id="volumeBar" min="0" max="100" value="80" oninput="setVolume(this.value)"/>
    </div>
  </div>
</footer>

<!-- Hidden YT Player -->
<div id="ytFrame"></div>

<!-- Toast -->
<div id="toast"></div>

<!-- Modal Playlist -->
<div id="playlistModal" class="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modalTitle">Playlist</h3>
      <button class="modal-close" onclick="document.getElementById('playlistModal').style.display='none'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="app.js"></script>
</body>
</html>
