<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NADA — Music Streaming</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET & TOKENS ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --card:      #16161f;
      --border:    rgba(255,255,255,0.06);
      --accent:    #e8ff47;
      --accent2:   #ff5c5c;
      --text:      #f0eeeb;
      --muted:     #6a6878;
      --player-h:  84px;
      --sidebar-w: 220px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      grid-template-rows: 1fr var(--player-h);
      grid-template-columns: var(--sidebar-w) 1fr;
      grid-template-areas:
        "sidebar main"
        "player  player";
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── SIDEBAR ── */
    #sidebar {
      grid-area: sidebar;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 28px 20px;
      gap: 40px;
      overflow-y: auto;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 4px;
      color: var(--accent);
      line-height: 1;
    }
    .logo span { color: var(--text); }

    .nav-section h6 {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--muted);
      transition: background .15s, color .15s;
      user-select: none;
    }
    .nav-item:hover { background: rgba(255,255,255,.04); color: var(--text); }
    .nav-item.active { background: rgba(232,255,71,.08); color: var(--accent); }
    .nav-item svg { flex-shrink: 0; }

    /* ── MAIN CONTENT ── */
    #main {
      grid-area: main;
      overflow-y: auto;
      padding: 36px 40px;
      position: relative;
    }

    /* ── TOPBAR ── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 40px;
    }

    .search-wrap {
      flex: 1;
      position: relative;
    }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }
    #searchInput {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px 12px 42px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    #searchInput::placeholder { color: var(--muted); }
    #searchInput:focus { border-color: var(--accent); }

    .btn-search {
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn-search:hover { opacity: .88; }
    .btn-search:active { transform: scale(.97); }

    /* ── SECTION TITLE ── */
    .section-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 20px;
    }
    .section-header h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
    }
    .section-header .pill {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 3px 10px;
    }

    /* ── HERO CARDS (recent) ── */
    .hero-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 48px;
    }

    .hero-card {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 16/10;
      background: var(--card);
      border: 1px solid var(--border);
      transition: transform .2s, box-shadow .2s;
    }
    .hero-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,.6); }
    .hero-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .3s;
    }
    .hero-card:hover img { transform: scale(1.04); }
    .hero-card .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.85) 40%, transparent);
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .hero-card .track-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hero-card .track-artist { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .hero-card .play-btn {
      position: absolute;
      top: 10px; right: 10px;
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transform: scale(.8);
      transition: opacity .2s, transform .2s;
    }
    .hero-card:hover .play-btn { opacity: 1; transform: scale(1); }
    .hero-card .play-btn svg { color: #0a0a0f; }

    /* ── TRACK LIST ── */
    .track-section { margin-bottom: 48px; }

    .track-list { display: flex; flex-direction: column; gap: 4px; }

    .track-item {
      display: grid;
      grid-template-columns: 44px 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s;
      border: 1px solid transparent;
    }
    .track-item:hover { background: var(--card); border-color: var(--border); }
    .track-item.playing { background: rgba(232,255,71,.06); border-color: rgba(232,255,71,.12); }

    .track-thumb {
      width: 44px; height: 44px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--surface);
      flex-shrink: 0;
    }
    .track-info { min-width: 0; }
    .track-info .t-title {
      font-size: 14px;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-item.playing .t-title { color: var(--accent); }
    .track-info .t-artist { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .track-action { color: var(--muted); display: flex; align-items: center; gap: 4px; }
    .track-action svg { opacity: 0; transition: opacity .15s; }
    .track-item:hover .track-action svg { opacity: 1; }

    /* ── HORIZONTAL SCROLL SECTION ── */
    .hscroll-wrap { overflow-x: auto; padding-bottom: 10px; }
    .hscroll-wrap::-webkit-scrollbar { height: 3px; }
    .hscroll-list {
      display: flex;
      gap: 14px;
      width: max-content;
    }

    .mini-card {
      width: 150px;
      cursor: pointer;
      transition: transform .2s;
    }
    .mini-card:hover { transform: translateY(-4px); }
    .mini-card img {
      width: 150px; height: 150px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid var(--border);
      display: block;
    }
    .mini-card .mc-title {
      font-size: 13px;
      margin-top: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mini-card .mc-artist { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── LOADING SKELETON ── */
    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, var(--surface) 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── PLAYER ── */
    #player {
      grid-area: player;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 260px 1fr 260px;
      align-items: center;
      padding: 0 28px;
      gap: 20px;
      position: relative;
      z-index: 100;
    }

    .player-track { display: flex; align-items: center; gap: 12px; min-width: 0; }
    #playerThumb {
      width: 52px; height: 52px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--card);
      flex-shrink: 0;
    }
    .player-track-info { min-width: 0; }
    #playerTitle {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #playerArtist { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .player-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .ctrl-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color .15s, transform .1s;
    }
    .ctrl-btn:hover { color: var(--text); }
    .ctrl-btn:active { transform: scale(.9); }
    .ctrl-btn.play-main {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 50%;
      color: #0a0a0f;
      justify-content: center;
    }
    .ctrl-btn.play-main:hover { opacity: .9; color: #0a0a0f; }

    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
    }
    .time-label { font-size: 10px; color: var(--muted); min-width: 34px; }
    .time-label.right { text-align: right; }

    #progressBar {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      border-radius: 99px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    #progressBar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0;
      transition: opacity .15s;
    }
    #progressBar:hover::-webkit-slider-thumb { opacity: 1; }
    #progressBar:hover { height: 5px; }

    .player-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 14px;
    }
    #volumeBar {
      -webkit-appearance: none;
      appearance: none;
      width: 80px;
      height: 3px;
      border-radius: 99px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }
    #volumeBar::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px; height: 10px;
      background: var(--text);
      border-radius: 50%;
    }

    /* ── EMPTY / ERROR STATE ── */
    .state-msg {
      text-align: center;
      padding: 48px 20px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }
    .state-msg b { color: var(--text); font-size: 16px; display: block; margin-bottom: 6px; }

    /* ── YT IFRAME HIDDEN ── */
    #ytFrame { display: none; position: absolute; }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: calc(var(--player-h) + 16px);
      left: 50%; transform: translateX(-50%);
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px;
      padding: 10px 20px;
      border-radius: 99px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .3s;
      z-index: 999;
    }
    #toast.show { opacity: 1; }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim { animation: fadeUp .4s ease both; }

    /* ── RESPONSIVE small tweak ── */
    @media (max-width: 900px) {
      body { grid-template-columns: 64px 1fr; }
      .nav-item span, .logo, .nav-section h6 { display: none; }
      #sidebar { padding: 20px 10px; align-items: center; }
      .hero-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar">
  <div class="logo">NA<span>DA</span></div>

  <div class="nav-section">
    <h6>Menu</h6>
    <div class="nav-item active" onclick="showHome()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Beranda</span>
    </div>
    <div class="nav-item" onclick="focusSearch()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Cari</span>
    </div>
  </div>
</aside>

<!-- MAIN -->
<main id="main">
  <!-- Topbar -->
  <div class="topbar">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" type="text" placeholder="Cari lagu, artis…" />
    </div>
    <button class="btn-search" onclick="doSearch()">Cari</button>
  </div>

  <!-- Content Area -->
  <div id="content"></div>
</main>

<!-- PLAYER -->
<footer id="player">
  <!-- Track info -->
  <div class="player-track">
    <img id="playerThumb" src="" alt="thumb" onerror="this.style.visibility='hidden'"/>
    <div class="player-track-info">
      <div id="playerTitle" style="color:var(--muted);font-size:13px">Belum ada lagu</div>
      <div id="playerArtist"></div>
    </div>
  </div>

  <!-- Controls -->
  <div class="player-center">
    <div class="controls">
      <button class="ctrl-btn" onclick="prevTrack()" title="Sebelumnya">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-btn play-main" id="playBtn" onclick="togglePlay()" title="Play/Pause">
        <svg id="playIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="nextTrack()" title="Berikutnya">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2.5-6 8.5 6V6z"/></svg>
      </button>
    </div>
    <div class="progress-row">
      <span class="time-label" id="curTime">0:00</span>
      <input type="range" id="progressBar" min="0" max="100" value="0" />
      <span class="time-label right" id="durTime">0:00</span>
    </div>
  </div>

  <!-- Volume -->
  <div class="player-right">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--muted)">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
    </svg>
    <input type="range" id="volumeBar" min="0" max="100" value="80" oninput="setVolume(this.value)" />
  </div>
</footer>

<!-- Hidden YT Player -->
<div id="ytFrame"></div>

<!-- Toast -->
<div id="toast"></div>

<!-- YouTube IFrame API -->
<script src="https://www.youtube.com/iframe_api"></script>

<script>
// ─── CONFIG ───
// Otomatis pakai URL Vercel saat deploy, localhost saat lokal
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:8000'
  : '';

// ─── STATE ───
let queue = [];
let currentIndex = -1;
let ytPlayer = null;
let ytReady = false;
let isPlaying = false;
let progressInterval = null;

// ─── YT API READY ───
function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('ytFrame', {
    height: '0', width: '0',
    playerVars: { autoplay: 1 },
    events: {
      onReady: () => { ytReady = true; },
      onStateChange: onPlayerStateChange,
    }
  });
}

function onPlayerStateChange(e) {
  if (e.data === YT.PlayerState.PLAYING) {
    isPlaying = true;
    setPlayIcon(true);
    startProgress();
  } else if (e.data === YT.PlayerState.PAUSED) {
    isPlaying = false;
    setPlayIcon(false);
    stopProgress();
  } else if (e.data === YT.PlayerState.ENDED) {
    nextTrack();
  }
}

// ─── PLAY ───
function playTrack(index) {
  if (!ytReady) { showToast('Player belum siap, tunggu sebentar…'); return; }
  if (index < 0 || index >= queue.length) return;
  currentIndex = index;
  const track = queue[index];
  updatePlayerUI(track);
  ytPlayer.loadVideoById(track.videoId);
  isPlaying = true;
  setPlayIcon(true);
  highlightActive();
}

function updatePlayerUI(track) {
  document.getElementById('playerTitle').textContent = track.title;
  document.getElementById('playerTitle').style.color = '';
  document.getElementById('playerArtist').textContent = track.artist;
  const thumb = document.getElementById('playerThumb');
  thumb.src = track.thumbnail;
  thumb.style.visibility = 'visible';
  document.title = `${track.title} — NADA`;
}

function togglePlay() {
  if (!ytPlayer || currentIndex < 0) return;
  if (isPlaying) { ytPlayer.pauseVideo(); }
  else { ytPlayer.playVideo(); }
}

function nextTrack() { playTrack((currentIndex + 1) % queue.length); }
function prevTrack() { playTrack((currentIndex - 1 + queue.length) % queue.length); }

function setPlayIcon(playing) {
  document.getElementById('playIcon').innerHTML = playing
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<path d="M8 5v14l11-7z"/>';
}

function setVolume(v) {
  if (ytPlayer && ytReady) ytPlayer.setVolume(parseInt(v));
}

// ─── PROGRESS ───
function startProgress() {
  stopProgress();
  progressInterval = setInterval(() => {
    if (!ytPlayer || !ytReady) return;
    const cur = ytPlayer.getCurrentTime?.() || 0;
    const dur = ytPlayer.getDuration?.() || 0;
    if (dur > 0) {
      document.getElementById('progressBar').value = (cur / dur) * 100;
      document.getElementById('curTime').textContent = formatTime(cur);
      document.getElementById('durTime').textContent = formatTime(dur);
    }
  }, 500);
}

function stopProgress() { clearInterval(progressInterval); }

document.getElementById('progressBar').addEventListener('input', function () {
  if (!ytPlayer || !ytReady) return;
  const dur = ytPlayer.getDuration?.() || 0;
  ytPlayer.seekTo((this.value / 100) * dur, true);
});

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// ─── HIGHLIGHT ───
function highlightActive() {
  document.querySelectorAll('.track-item').forEach((el, i) => {
    el.classList.toggle('playing', parseInt(el.dataset.queueIdx) === currentIndex);
  });
}

// ─── API ───
async function fetchHome() {
  const res = await fetch(`${API}/api/home`);
  return res.json();
}

async function fetchSearch(q) {
  const res = await fetch(`${API}/api/search?query=${encodeURIComponent(q)}`);
  return res.json();
}

// ─── HOME PAGE ───
async function showHome() {
  setNavActive(0);
  const content = document.getElementById('content');
  content.innerHTML = buildSkeletonHome();

  try {
    const { status, data, message } = await fetchHome();
    if (status !== 'success') throw new Error(message);
    content.innerHTML = '';

    // Recent (hero grid)
    content.appendChild(buildHeroSection('Hits Terbaru 2025', 'recent', data.recent));

    // Trending (track list)
    content.appendChild(buildListSection('Trending Sekarang', 'trending', data.trending));

    // Chill (horizontal scroll)
    content.appendChild(buildScrollSection('Santai & Cafe', 'chill', data.chill));

    // Galau (horizontal scroll)
    content.appendChild(buildScrollSection('Lagu Galau', 'galau', data.galau));

  } catch (e) {
    content.innerHTML = `<div class="state-msg"><b>Gagal memuat data</b>Pastikan server backend berjalan di <code>${API}</code></div>`;
  }
}

// ─── SEARCH ───
async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  setNavActive(-1);
  const content = document.getElementById('content');
  content.innerHTML = buildSkeletonList(8);

  try {
    const { status, data, message } = await fetchSearch(q);
    if (status !== 'success') throw new Error(message);
    content.innerHTML = '';

    if (!data.length) {
      content.innerHTML = `<div class="state-msg"><b>Tidak ada hasil</b>Coba kata kunci lain</div>`;
      return;
    }

    queue = data;
    const section = buildListSection(`Hasil untuk "${q}"`, 'search', data);
    content.appendChild(section);
  } catch (e) {
    content.innerHTML = `<div class="state-msg"><b>Gagal mencari</b>${e.message}</div>`;
  }
}

// ─── BUILDERS ───
function buildHeroSection(label, key, tracks) {
  const wrap = document.createElement('div');
  wrap.className = 'anim';
  wrap.style.marginBottom = '48px';
  wrap.innerHTML = `
    <div class="section-header">
      <h2>${label}</h2>
      <span class="pill">${tracks.length} lagu</span>
    </div>
    <div class="hero-grid" id="hg-${key}"></div>`;

  // Push to queue
  const offset = queue.length;
  queue = queue.concat(tracks);

  setTimeout(() => {
    const grid = wrap.querySelector(`#hg-${key}`);
    tracks.forEach((t, i) => {
      const idx = offset + i;
      const card = document.createElement('div');
      card.className = 'hero-card';
      card.innerHTML = `
        <img src="${t.thumbnail}" alt="" loading="lazy" />
        <div class="overlay">
          <div class="track-title">${escHtml(t.title)}</div>
          <div class="track-artist">${escHtml(t.artist)}</div>
        </div>
        <div class="play-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </div>`;
      card.onclick = () => { queue = queue; playTrack(idx); };
      card.style.animationDelay = `${i * 0.05}s`;
      card.classList.add('anim');
      grid.appendChild(card);
    });
  }, 0);
  return wrap;
}

function buildListSection(label, key, tracks) {
  const wrap = document.createElement('div');
  wrap.className = 'track-section anim';

  const offset = key === 'search' ? 0 : queue.length;
  if (key !== 'search') queue = queue.concat(tracks);

  wrap.innerHTML = `
    <div class="section-header">
      <h2>${label}</h2>
      <span class="pill">${tracks.length} lagu</span>
    </div>
    <div class="track-list" id="tl-${key}"></div>`;

  setTimeout(() => {
    const list = wrap.querySelector(`#tl-${key}`);
    tracks.forEach((t, i) => {
      const idx = offset + i;
      const item = document.createElement('div');
      item.className = 'track-item';
      item.dataset.queueIdx = idx;
      item.innerHTML = `
        <img class="track-thumb" src="${t.thumbnail}" alt="" loading="lazy" onerror="this.src=''"/>
        <div class="track-info">
          <div class="t-title">${escHtml(t.title)}</div>
          <div class="t-artist">${escHtml(t.artist)}</div>
        </div>
        <div class="track-action">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </div>`;
      item.onclick = () => playTrack(idx);
      list.appendChild(item);
    });
  }, 0);
  return wrap;
}

function buildScrollSection(label, key, tracks) {
  const wrap = document.createElement('div');
  wrap.className = 'track-section anim';

  const offset = queue.length;
  queue = queue.concat(tracks);

  wrap.innerHTML = `
    <div class="section-header">
      <h2>${label}</h2>
      <span class="pill">${tracks.length} lagu</span>
    </div>
    <div class="hscroll-wrap">
      <div class="hscroll-list" id="hs-${key}"></div>
    </div>`;

  setTimeout(() => {
    const list = wrap.querySelector(`#hs-${key}`);
    tracks.forEach((t, i) => {
      const idx = offset + i;
      const card = document.createElement('div');
      card.className = 'mini-card';
      card.innerHTML = `
        <img src="${t.thumbnail}" alt="" loading="lazy" onerror="this.style.opacity='.3'"/>
        <div class="mc-title">${escHtml(t.title)}</div>
        <div class="mc-artist">${escHtml(t.artist)}</div>`;
      card.onclick = () => playTrack(idx);
      list.appendChild(card);
    });
  }, 0);
  return wrap;
}

// ─── SKELETONS ───
function buildSkeletonHome() {
  return `
    <div style="margin-bottom:48px">
      <div class="skeleton" style="width:200px;height:28px;margin-bottom:20px"></div>
      <div class="hero-grid">${Array(6).fill(`
        <div class="skeleton" style="border-radius:14px;aspect-ratio:16/10"></div>`).join('')}
      </div>
    </div>
    ${buildSkeletonList(5)}`;
}

function buildSkeletonList(n) {
  return `
    <div style="margin-bottom:48px">
      <div class="skeleton" style="width:180px;height:28px;margin-bottom:20px"></div>
      ${Array(n).fill(`
        <div style="display:flex;gap:14px;align-items:center;margin-bottom:8px">
          <div class="skeleton" style="width:44px;height:44px;border-radius:8px;flex-shrink:0"></div>
          <div style="flex:1"><div class="skeleton" style="height:13px;width:60%;margin-bottom:6px"></div>
          <div class="skeleton" style="height:11px;width:35%"></div></div>
        </div>`).join('')}
    </div>`;
}

// ─── NAV ───
function setNavActive(i) {
  document.querySelectorAll('.nav-item').forEach((el, idx) => el.classList.toggle('active', idx === i));
}

function focusSearch() {
  document.getElementById('searchInput').focus();
  setNavActive(1);
}

// ─── TOAST ───
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── UTIL ───
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── KEYBOARD ───
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') nextTrack();
  if (e.code === 'ArrowLeft') prevTrack();
});

// ─── SEARCH ON ENTER ───
document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// ─── INIT ───
showHome();
</script>
